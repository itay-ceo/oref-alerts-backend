<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - ניהול צלילים</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a1a;
    color: #e0e0e0;
    padding: 24px;
    direction: rtl;
  }
  h1 { color: #a78bfa; margin-bottom: 24px; font-size: 28px; }
  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .filter-row { display: flex; gap: 8px; }
  .filter-btn {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid #333;
    background: transparent;
    color: #aaa;
    cursor: pointer;
    font-size: 14px;
  }
  .filter-btn.active { border-color: #a78bfa; color: #a78bfa; background: rgba(167,139,250,0.1); }
  .btn-add {
    padding: 10px 24px;
    border-radius: 10px;
    border: none;
    background: #a78bfa;
    color: #0a0a1a;
    font-weight: 700;
    font-size: 15px;
    cursor: pointer;
  }
  .btn-add:hover { background: #8b5cf6; }

  /* Table */
  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: right;
    padding: 12px 16px;
    border-bottom: 2px solid #1e1e3a;
    color: #888;
    font-size: 13px;
    font-weight: 600;
  }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid #1a1a30;
    vertical-align: middle;
  }
  tr:hover td { background: rgba(167,139,250,0.04); }
  .thumb {
    width: 48px;
    height: 48px;
    border-radius: 8px;
    object-fit: cover;
    background: #1a1a30;
  }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge-warning { background: rgba(250,204,21,0.15); color: #facc15; }
  .badge-active { background: rgba(255,0,110,0.15); color: #ff006e; }
  .badge-all_clear { background: rgba(0,255,135,0.15); color: #00ff87; }

  .toggle {
    width: 44px; height: 24px;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    position: relative;
    transition: background 0.2s;
  }
  .toggle.on { background: #22c55e; }
  .toggle.off { background: #444; }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: white;
    transition: right 0.2s, left 0.2s;
  }
  .toggle.on::after { left: 3px; }
  .toggle.off::after { right: 3px; }

  .action-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid #333;
    background: transparent;
    color: #ccc;
    cursor: pointer;
    font-size: 13px;
    margin-inline-start: 6px;
  }
  .action-btn:hover { border-color: #666; color: #fff; }
  .action-btn.delete { border-color: #7f1d1d; color: #f87171; }
  .action-btn.delete:hover { background: rgba(248,113,113,0.1); }

  /* Modal */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }
  .overlay.open { display: flex; }
  .modal {
    background: #12122a;
    border-radius: 16px;
    padding: 32px;
    width: 440px;
    max-width: 95vw;
    border: 1px solid #2a2a4a;
  }
  .modal h2 { color: #a78bfa; margin-bottom: 20px; font-size: 20px; }
  .field { margin-bottom: 16px; }
  .field label { display: block; margin-bottom: 6px; color: #aaa; font-size: 13px; }
  .field input, .field select {
    width: 100%;
    padding: 10px 14px;
    border-radius: 8px;
    border: 1px solid #2a2a4a;
    background: #0a0a1a;
    color: #e0e0e0;
    font-size: 14px;
  }
  .field input:focus, .field select:focus { outline: none; border-color: #a78bfa; }
  .field input[type="file"] { padding: 8px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-start; margin-top: 24px; }
  .btn-save {
    padding: 10px 28px;
    border-radius: 10px;
    border: none;
    background: #a78bfa;
    color: #0a0a1a;
    font-weight: 700;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-cancel {
    padding: 10px 28px;
    border-radius: 10px;
    border: 1px solid #333;
    background: transparent;
    color: #aaa;
    cursor: pointer;
    font-size: 14px;
  }

  .empty { text-align: center; padding: 48px; color: #555; font-size: 16px; }

  .audio-preview { cursor: pointer; font-size: 20px; }
  .audio-preview:hover { opacity: 0.7; }
</style>
</head>
<body>

<h1>ניהול צלילים</h1>

<div class="toolbar">
  <div class="filter-row">
    <button class="filter-btn active" data-cat="all">הכל</button>
    <button class="filter-btn" data-cat="warning">התראה מוקדמת</button>
    <button class="filter-btn" data-cat="active">אזעקה</button>
    <button class="filter-btn" data-cat="all_clear">סיום אירוע</button>
  </div>
  <button class="btn-add" onclick="openModal()">+ הוסף צליל</button>
</div>

<table>
  <thead>
    <tr>
      <th>תמונה</th>
      <th>שם</th>
      <th>קטגוריה</th>
      <th>שמע</th>
      <th>פעיל</th>
      <th>פעולות</th>
    </tr>
  </thead>
  <tbody id="tbody"></tbody>
</table>
<div id="empty" class="empty" style="display:none">אין צלילים עדיין</div>

<!-- Add / Edit Modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h2 id="modalTitle">הוסף צליל</h2>
    <form id="soundForm" enctype="multipart/form-data">
      <input type="hidden" id="editId">
      <div class="field">
        <label>שם הצליל</label>
        <input type="text" id="fTitle" required placeholder="למשל: ביטון 1">
      </div>
      <div class="field">
        <label>קטגוריה</label>
        <select id="fCategory" required>
          <option value="warning">התראה מוקדמת</option>
          <option value="active">אזעקה</option>
          <option value="all_clear">סיום אירוע</option>
        </select>
      </div>
      <div class="field">
        <label>תמונה (JPG)</label>
        <input type="file" id="fImage" accept="image/*">
      </div>
      <div class="field">
        <label>קובץ שמע (MP3)</label>
        <input type="file" id="fAudio" accept="audio/*">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-save" id="btnSave" onclick="saveSound()">שמור</button>
        <button type="button" class="btn-cancel" onclick="closeModal()">ביטול</button>
      </div>
    </form>
  </div>
</div>

<script>
const API = '/admin/sounds';
let sounds = [];
let filterCat = 'all';
let currentAudio = null;
let loadController = null;
let isLoading = false;

const CATEGORY_LABELS = { warning: 'התראה מוקדמת', active: 'אזעקה', all_clear: 'סיום אירוע' };

// ─── Fetch & Render ─────────────────────────────────────────────────
async function loadSounds() {
  // Cancel any in-flight request
  if (loadController) loadController.abort();
  loadController = new AbortController();
  isLoading = true;
  try {
    const res = await fetch(API, { signal: loadController.signal });
    sounds = await res.json();
    render();
  } catch (err) {
    if (err.name !== 'AbortError') console.error('Load failed:', err);
  } finally {
    isLoading = false;
  }
}

function render() {
  const filtered = filterCat === 'all' ? sounds : sounds.filter(s => s.category === filterCat);
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');

  if (filtered.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(s => `
    <tr data-id="${esc(s.id)}">
      <td>${s.image_path
        ? `<img class="thumb" src="${s.image_path}" alt="">`
        : '<div class="thumb"></div>'}</td>
      <td>${esc(s.title)}</td>
      <td><span class="badge badge-${s.category}">${CATEGORY_LABELS[s.category]}</span></td>
      <td>${s.audio_path
        ? `<span class="audio-preview" data-audio="${s.audio_path}">&#9654;</span>`
        : '—'}</td>
      <td>
        <button class="toggle ${s.is_active ? 'on' : 'off'}" data-action="toggle" data-active="${s.is_active}"></button>
      </td>
      <td>
        <button class="action-btn" data-action="edit">ערוך</button>
        <button class="action-btn delete" data-action="delete">מחק</button>
      </td>
    </tr>
  `).join('');

  // Event delegation — read the ID from the closest <tr> at click time
  tbody.onclick = function(e) {
    const tr = e.target.closest('tr[data-id]');
    if (!tr) return;
    const id = tr.dataset.id;
    const action = e.target.dataset.action;
    if (action === 'edit') openEdit(id);
    else if (action === 'delete') deleteSnd(id);
    else if (action === 'toggle') toggleActive(id, e.target.dataset.active === 'true');
    else if (e.target.dataset.audio) playAudio(e.target.dataset.audio, e.target);
  };
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ─── Filter ─────────────────────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterCat = btn.dataset.cat;
    render();
  });
});

// ─── Audio preview ──────────────────────────────────────────────────
function playAudio(url, el) {
  if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  currentAudio = new Audio(url);
  currentAudio.play();
  currentAudio.onended = () => { currentAudio = null; };
}

// ─── Toggle active ──────────────────────────────────────────────────
async function toggleActive(id, current) {
  if (isLoading) return;
  try {
    await fetch(`${API}/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ is_active: current ? 0 : 1 }),
    });
    await loadSounds();
  } catch (err) { console.error('Toggle failed:', err); }
}

// ─── Delete ─────────────────────────────────────────────────────────
async function deleteSnd(id) {
  if (!confirm('למחוק את הצליל?')) return;
  await fetch(`${API}/${id}`, { method: 'DELETE' });
  await loadSounds();
}

// ─── Modal ──────────────────────────────────────────────────────────
function openModal() {
  document.getElementById('editId').value = '';
  document.getElementById('modalTitle').textContent = 'הוסף צליל';
  document.getElementById('soundForm').reset();
  document.getElementById('overlay').classList.add('open');
}

function openEdit(id) {
  const s = sounds.find(x => String(x.id) === String(id));
  if (!s) { console.warn('openEdit: sound not found for id', id); return; }
  document.getElementById('soundForm').reset();
  document.getElementById('editId').value = s.id;
  document.getElementById('modalTitle').textContent = 'ערוך צליל';
  document.getElementById('fTitle').value = s.title;
  document.getElementById('fCategory').value = s.category;
  document.getElementById('overlay').classList.add('open');
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
}

// Close on overlay click
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});

// ─── Save ───────────────────────────────────────────────────────────
async function saveSound() {
  console.log('saveSound() called');
  // Cancel any pending loads so the POST isn't blocked
  if (loadController) { loadController.abort(); loadController = null; }
  isLoading = false;

  const editId = document.getElementById('editId').value;
  const title = document.getElementById('fTitle').value.trim();
  const category = document.getElementById('fCategory').value;
  if (!title) { alert('יש להזין שם צליל'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true;
  btn.textContent = '⏳ שומר...';

  const fd = new FormData();
  fd.append('title', title);
  fd.append('category', category);

  const imgFile = document.getElementById('fImage').files[0];
  const audFile = document.getElementById('fAudio').files[0];
  if (imgFile) fd.append('image', imgFile);
  if (audFile) fd.append('audio', audFile);

  const url = editId ? '/admin/sounds/' + editId : '/admin/sounds';
  const method = editId ? 'PUT' : 'POST';

  console.log('Fetching:', method, url, 'title:', title, 'category:', category);
  try {
    const res = await fetch(url, { method: method, body: fd });
    const json = await res.json();
    console.log('Save response:', res.status, json);
    closeModal();
    loadSounds();
  } catch (err) {
    console.error('Save failed:', err);
    alert('שגיאה בשמירה: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = 'שמור';
  }
}

// ─── Init ───────────────────────────────────────────────────────────
loadSounds();
</script>
</body>
</html>
